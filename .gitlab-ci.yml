stages:
  - test
  - deploy

# TypeScript jobs
.ts-template:
  stage: test
  image: node:${NODE_VERSION}
  rules:
    - changes:
        - ts/**/*
        - .gitlab-ci.yml
  before_script:
    - cd ts
    - npm ci
  script:
    - npm test

ts-node-20:
  extends: .ts-template
  variables:
    NODE_VERSION: "20"

ts-node-22:
  extends: .ts-template
  variables:
    NODE_VERSION: "22"

# Python jobs
.python-template:
  stage: test
  image: python:${PYTHON_VERSION}
  rules:
    - changes:
        - python/**/*
        - .gitlab-ci.yml
  before_script:
    - cd python
    - pip install --upgrade pip
    - pip install flake8 pytest
    - pip install -e .
  script:
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - pytest

python-3.8:
  extends: .python-template
  variables:
    PYTHON_VERSION: "3.8"

python-3.9:
  extends: .python-template
  variables:
    PYTHON_VERSION: "3.9"

python-3.10:
  extends: .python-template
  variables:
    PYTHON_VERSION: "3.10"

python-3.11:
  extends: .python-template
  variables:
    PYTHON_VERSION: "3.11"

python-3.12:
  extends: .python-template
  variables:
    PYTHON_VERSION: "3.12"

python-3.13:
  extends: .python-template
  variables:
    PYTHON_VERSION: "3.13"

# Publish TypeScript to GitLab Package Registry
publish-ts-npm:
  image: node:22
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^ts-v/
  script:
    - cd ts
    - npm ci
    - npm run build
    - echo "@0353F40E:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm publish
